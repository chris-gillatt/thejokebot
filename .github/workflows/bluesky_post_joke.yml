name: bluesky_post_joke

on:
  schedule:
    - cron: "0 0,4,8,12,16,20 * * *"  # Runs every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:

concurrency:
  group: bot_state_writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bluesky_post_joke:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openvpn ca-certificates

      - name: Connect NordVPN
        env:
          VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
          VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
        run: |
          set -euo pipefail

          AUTH_FILE="$(mktemp)"
          PID_FILE="$RUNNER_TEMP/openvpn.pid"
          LOG_FILE="$RUNNER_TEMP/openvpn.log"

          # OpenVPN auth files are two lines: username then password.
          printf '%s\n%s\n' "$VPN_USERNAME" "$VPN_PASSWORD" > "$AUTH_FILE"
          chmod 600 "$AUTH_FILE"

          sudo openvpn \
            --config vpn/sg527.nordvpn.com.tcp.ovpn \
            --auth-user-pass "$AUTH_FILE" \
            --daemon \
            --writepid "$PID_FILE" \
            --log "$LOG_FILE"

          for i in $(seq 1 30); do
            if ip link show tun0 >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          if ! ip link show tun0 >/dev/null 2>&1; then
            echo "VPN tunnel did not come up."
            sudo tail -n 120 "$LOG_FILE" || true
            rm -f "$AUTH_FILE"
            exit 1
          fi

          echo "VPN_PID_FILE=$PID_FILE" >> "$GITHUB_ENV"
          echo "VPN_LOG_FILE=$LOG_FILE" >> "$GITHUB_ENV"

          rm -f "$AUTH_FILE"

          echo "Egress IP after VPN connect:"
          curl -4fsS https://ifconfig.me
          echo

      - name: Diagnose Bluesky connectivity
        run: |
          URL="https://bsky.social/xrpc/com.atproto.server.describeServer"

          echo "=== curl (baseline) ==="
          curl -s -o /dev/null -w "http_code=%{http_code}\n" "$URL"

          echo "=== httpx default (HTTP/2 + atproto UA) ==="
          python - <<'PYEOF'
          import httpx
          r = httpx.get(
              "https://bsky.social/xrpc/com.atproto.server.describeServer",
              headers={"User-Agent": "atproto/0.0.65 Python SDK (atproto.blue)"},
          )
          print(f"http_code={r.status_code} server={r.headers.get('server','n/a')}")
          PYEOF

          echo "=== httpx HTTP/1.1 forced (no h2 ALPN) ==="
          python - <<'PYEOF'
          import httpx
          r = httpx.get(
              "https://bsky.social/xrpc/com.atproto.server.describeServer",
              headers={"User-Agent": "atproto/0.0.65 Python SDK (atproto.blue)"},
              http2=False,
          )
          print(f"http_code={r.status_code} server={r.headers.get('server','n/a')}")
          PYEOF

          echo "=== requests (urllib3, no h2 ALPN) ==="
          python - <<'PYEOF'
          import requests
          r = requests.get(
              "https://bsky.social/xrpc/com.atproto.server.describeServer",
              headers={"User-Agent": "atproto/0.0.65 Python SDK (atproto.blue)"},
          )
          print(f"http_code={r.status_code} server={r.headers.get('server','n/a')}")
          PYEOF

      - name: Run bluesky_post_joke
        env:
          BLUESKY_USERNAME: ${{ vars.BLUESKY_USERNAME }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          API_NINJAS_API_KEY: ${{ secrets.API_NINJAS_API_KEY }}
        run: python bluesky_post_joke.py

      - name: Disconnect NordVPN
        if: always()
        run: |
          set -euo pipefail

          if [ -n "${VPN_PID_FILE:-}" ] && [ -f "$VPN_PID_FILE" ]; then
            sudo kill "$(cat "$VPN_PID_FILE")" || true
          fi

          if [ -n "${VPN_LOG_FILE:-}" ] && [ -f "$VPN_LOG_FILE" ]; then
            echo "Last OpenVPN log lines:"
            sudo tail -n 60 "$VPN_LOG_FILE" || true
          fi

      - name: Update bot_state.json
        run: |
          # Use the GitHub Bot user for Git and GitHub IAM.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Persist updated provider rotation and joke history.
          git add bot_state.json

          # Commit and push only when the file changed.
          if git diff --cached --quiet; then
            echo "No bot_state.json changes to commit."
            exit 0
          fi

          git commit -m "chore: update bot_state.json; GH run: ${GITHUB_RUN_NUMBER}"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after 3 attempts."
              exit 1
            fi
            echo "Push rejected, retrying (${attempt}/3)..."
          done