name: bluesky_post_joke

on:
  schedule:
    - cron:  '0 0,8,16 * * *'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  bluesky_post_joke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run bluesky_post_joke
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: python bluesky_post_joke.py

      - name: Update posted_jokes.txt
      - name: Update bot_state.json
        run: |
          # Use the GitHub Bot user for Git and GitHub IAM.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Persist updated provider rotation and joke history.
          git add bot_state.json

          # Commit and push only when the file changed.
          if git diff --cached --quiet; then
            echo "No bot_state.json changes to commit."
            exit 0
          fi

          git commit -m "chore: update bot_state.json; GH run: ${GITHUB_RUN_NUMBER}"
          git push