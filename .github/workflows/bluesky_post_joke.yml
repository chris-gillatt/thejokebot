name: bluesky_post_joke

on:
  schedule:
    - cron: "0 0,4,8,12,16,20 * * *"  # Runs every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:

concurrency:
  group: bot_state_writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bluesky_post_joke:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Restore Bluesky session cache
        id: bluesky_session_cache
        uses: actions/cache/restore@v5
        with:
          path: .agent-tmp/bluesky_session.txt
          key: bluesky-session-${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            bluesky-session-${{ github.workflow }}-${{ github.ref_name }}-
            bluesky-session-${{ github.ref_name }}-

      - name: Run bluesky_post_joke
        env:
          BLUESKY_USERNAME: ${{ vars.BLUESKY_USERNAME }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          BLUESKY_SESSION_RESTORE_ENABLED: "true"
          BLUESKY_SESSION_PERSIST_ENABLED: "true"
          BLUESKY_SESSION_FILE_PATH: .agent-tmp/bluesky_session.txt
          API_NINJAS_API_KEY: ${{ secrets.API_NINJAS_API_KEY }}
        run: python bluesky_post_joke.py

      - name: Ensure session cache path exists
        if: always()
        run: |
          mkdir -p .agent-tmp
          touch .agent-tmp/bluesky_session.txt

      - name: Save Bluesky session cache
        if: always() && steps.bluesky_session_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .agent-tmp/bluesky_session.txt
          key: bluesky-session-${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}

      - name: Update bot_state.json
        run: |
          # Use the GitHub Bot user for Git and GitHub IAM.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Persist updated provider rotation and joke history.
          git add bot_state.json

          # Commit and push only when the file changed.
          if git diff --cached --quiet; then
            echo "No bot_state.json changes to commit."
            exit 0
          fi

          git commit -m "chore: update bot_state.json; GH run: ${GITHUB_RUN_NUMBER}"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after 3 attempts."
              exit 1
            fi
            echo "Push rejected, retrying (${attempt}/3)..."
          done