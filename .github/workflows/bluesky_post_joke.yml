name: bluesky_post_joke

on:
  schedule:
    - cron: "0 0,8,16 * * *"  # Runs at 00:00, 08:00, and 16:00 UTC
  workflow_dispatch:

concurrency:
  group: bluesky_post_joke
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bluesky_post_joke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run bluesky_post_joke
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          API_NINJAS_API_KEY: ${{ secrets.API_NINJAS_API_KEY }}
        run: python bluesky_post_joke.py

      - name: Update bot_state.json
        run: |
          # Use the GitHub Bot user for Git and GitHub IAM.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Persist updated provider rotation and joke history.
          git add bot_state.json

          # Commit and push only when the file changed.
          if git diff --cached --quiet; then
            echo "No bot_state.json changes to commit."
            exit 0
          fi

          git commit -m "chore: update bot_state.json; GH run: ${GITHUB_RUN_NUMBER}"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after 3 attempts."
              exit 1
            fi
            echo "Push rejected, retrying (${attempt}/3)..."
          done