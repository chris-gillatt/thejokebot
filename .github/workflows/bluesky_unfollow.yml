name: bluesky_unfollow

on:
  # Runs twice yearly to give accounts plenty of time to follow back.
  # 1 January and 1 July at 12:00 UTC.
  schedule:
    - cron: "0 12 1 1,7 *"  # 1 Jan and 1 Jul at 12:00 UTC
  workflow_dispatch:

jobs:
  bluesky_unfollow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run bluesky_unfollow
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          BLUESKY_ACTION_DELAY_SECONDS: "1"
          BLUESKY_UNFOLLOW_MAX_ACTIONS: "200"
          BLUESKY_UNFOLLOW_BATCH_SIZE: "50"
          BLUESKY_UNFOLLOW_BATCH_PAUSE_SECONDS: "60"
        run: python bluesky_unfollow.py
