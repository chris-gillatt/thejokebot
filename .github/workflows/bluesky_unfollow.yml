name: bluesky_unfollow

on:
  # Schedule is intentionally disabled. When enabled, this runs on the
  # second Monday of each month at 12:00 UTC.
  # schedule:
  #   - cron: "0 12 8-14 * 1"  # 2nd Monday each month at 12:00 UTC
  workflow_dispatch:

jobs:
  bluesky_unfollow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run bluesky_unfollow
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: python bluesky_unfollow.py
