name: bluesky_follow_fellows

on:
  schedule:
    - cron: "0 0 * * 3,5"  # Runs every Wednesday and Friday at 00:00 UTC
  workflow_dispatch:

concurrency:
  group: bot_state_writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bluesky_follow_fellows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Restore Bluesky session cache
        id: bluesky_session_cache
        uses: actions/cache/restore@v5
        with:
          path: .agent-tmp/bluesky_session.txt
          key: bluesky-session-${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            bluesky-session-${{ github.workflow }}-${{ github.ref_name }}-
            bluesky-session-${{ github.ref_name }}-

      - name: Run bluesky_follow_fellows
        env:
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          BLUESKY_USERNAME: ${{ vars.BLUESKY_USERNAME }}
          BLUESKY_SESSION_RESTORE_ENABLED: "true"
          BLUESKY_SESSION_PERSIST_ENABLED: "true"
          BLUESKY_SESSION_FILE_PATH: .agent-tmp/bluesky_session.txt
        run: python bluesky_follow_fellows.py

      - name: Ensure session cache path exists
        if: always()
        run: |
          mkdir -p .agent-tmp
          touch .agent-tmp/bluesky_session.txt

      - name: Save Bluesky session cache
        if: always() && steps.bluesky_session_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .agent-tmp/bluesky_session.txt
          key: bluesky-session-${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}

      - name: Persist follow grace state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bot_state.json

          if git diff --cached --quiet; then
            echo "No bot_state.json changes to commit."
            exit 0
          fi

          git commit -m "chore(follow-fellows): persist follow grace state; GH run: ${GITHUB_RUN_NUMBER}"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after 3 attempts."
              exit 1
            fi
            echo "Push rejected, retrying (${attempt}/3)..."
          done
