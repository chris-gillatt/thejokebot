name: bluesky_follow_fellows

on:
  schedule:
    - cron: "0 0 * * 5"  # Runs every Friday at 00:00 UTC
  workflow_dispatch:

concurrency:
  group: bot_state_writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bluesky_follow_fellows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run bluesky_follow_fellows
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          BLUESKY_USERNAME: ${{ vars.BLUESKY_USERNAME }}
        run: python bluesky_follow_fellows.py

      - name: Persist follow grace state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bot_state.json

          if git diff --cached --quiet; then
            echo "No bot_state.json changes to commit."
            exit 0
          fi

          git commit -m "chore(follow-fellows): persist follow grace state; GH run: ${GITHUB_RUN_NUMBER}"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after 3 attempts."
              exit 1
            fi
            echo "Push rejected, retrying (${attempt}/3)..."
          done
