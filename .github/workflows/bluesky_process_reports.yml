name: bluesky_process_reports

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bluesky_process_reports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Process #report replies
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          BLUESKY_REPORT_OUTPUT: .agent-tmp/report_proposals.json
        run: python bluesky_process_reports.py

      - name: Persist report checkpoint state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bot_state.json

          if git diff --cached --quiet; then
            echo "No bot_state.json changes to commit."
            exit 0
          fi

          git commit -m "chore(reports): update report checkpoint state; GH run: ${GITHUB_RUN_NUMBER}"
          git push

      - name: Create denylist PRs for new reports
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BLUESKY_REPORT_OUTPUT: .agent-tmp/report_proposals.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python bluesky_create_report_prs.py
