name: Test Proxy Post

on:
  workflow_dispatch:
    inputs:
      proxy_url:
        description: "Proxy URL (e.g., http://proxy:port or socks5://proxy:port)"
        required: false
        default: ""

jobs:
  test-proxy-post:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Bluesky API through proxy
        env:
          BLUESKY_USERNAME: ${{ vars.BLUESKY_USERNAME }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          HTTPS_PROXY: ${{ github.event.inputs.proxy_url }}
          HTTP_PROXY: ${{ github.event.inputs.proxy_url }}
          ALL_PROXY: ${{ github.event.inputs.proxy_url }}
        run: |
          echo "Testing Bluesky API with proxy..."
          if [ -z "$HTTPS_PROXY" ]; then
            echo "No proxy URL provided - using direct connection"
          else
            echo "Using proxy: $HTTPS_PROXY"
          fi
          
          python << 'PYTHON_EOF'
          import os
          import sys
          from bluesky_common import login_client
          
          https_proxy = os.getenv("HTTPS_PROXY", "(not set)")
          http_proxy = os.getenv("HTTP_PROXY", "(not set)")
          print(f"HTTPS_PROXY: {https_proxy}")
          print(f"HTTP_PROXY: {http_proxy}")
          
          try:
              client, username = login_client()
              print(f"✓ Successfully authenticated as {username}")
              sys.exit(0)
          except Exception as e:
              print(f"✗ Authentication failed: {type(e).__name__}: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          PYTHON_EOF
