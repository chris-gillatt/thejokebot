name: codeql

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyse:
    name: Analyse (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        language:
          - python

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialise CodeQL
        uses: github/codeql-action/init@6bb031afdd747485da9680ed606275c900693006 # v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@6bb031afdd747485da9680ed606275c900693006 # v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@6bb031afdd747485da9680ed606275c900693006 # v4