name: bluesky_manage_starter_pack

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Operation mode"
        required: true
        default: "setup"
        type: choice
        options:
          - setup
          - sync
      apply_changes:
        description: "If true, execute live mutations (otherwise dry-run)."
        required: true
        default: false
        type: boolean

concurrency:
  group: bluesky_manage_starter_pack
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bluesky_manage_starter_pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run starter-pack manager
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          BLUESKY_USERNAME: ${{ vars.BLUESKY_USERNAME }}
          MODE: ${{ inputs.mode }}
          APPLY_CHANGES: ${{ inputs.apply_changes }}
        run: |
          if [ "$APPLY_CHANGES" = "true" ]; then
            export BLUESKY_DRY_RUN="false"
          else
            export BLUESKY_DRY_RUN="true"
          fi
          python bluesky_manage_starter_pack.py --mode "$MODE"
