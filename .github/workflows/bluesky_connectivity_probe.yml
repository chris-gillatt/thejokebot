name: bluesky_connectivity_probe

on:
  workflow_dispatch:

permissions: {}

jobs:
  connectivity_probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Probe createSession via requests
        env:
          BLUESKY_USERNAME: ${{ vars.BLUESKY_USERNAME }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          python -c 'import os, requests
u = os.environ.get("BLUESKY_USERNAME")
p = os.environ.get("BLUESKY_APP_PASSWORD")
r = requests.post(
    "https://bsky.social/xrpc/com.atproto.server.createSession",
    json={"identifier": u, "password": p},
    timeout=30,
)
print("CREATE_SESSION_STATUS", r.status_code)
print("CREATE_SESSION_SERVER", r.headers.get("server", ""))
print("CREATE_SESSION_CONTENT_TYPE", r.headers.get("content-type", ""))'

      - name: Probe shared login_client path
        env:
          BLUESKY_USERNAME: ${{ vars.BLUESKY_USERNAME }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          BLUESKY_LOGIN_RETRY_ATTEMPTS: "1"
          BLUESKY_LOGIN_RETRY_DELAY_SECONDS: "0"
        run: |
          python -c 'from bluesky_common import login_client
_client, username = login_client()
print("LOGIN_CLIENT_OK", username)'
