name: ruff_quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: changed_files
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docs:
              - '**/*.md'
              - 'docs/**'
              - 'images/**'
            non_docs:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!images/**'

      - name: Report docs-only skip decision
        if: github.event_name != 'workflow_dispatch' && steps.changed_files.outputs.docs == 'true' && steps.changed_files.outputs.non_docs != 'true'
        run: echo "Docs-only change detected; skipping ruff_quality job steps."

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.changed_files.outputs.non_docs == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        if: github.event_name == 'workflow_dispatch' || steps.changed_files.outputs.non_docs == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff==0.15.13

      - name: Run Ruff lint
        if: github.event_name == 'workflow_dispatch' || steps.changed_files.outputs.non_docs == 'true'
        run: ruff check .

      - name: Run Ruff format check
        if: github.event_name == 'workflow_dispatch' || steps.changed_files.outputs.non_docs == 'true'
        run: ruff format --check .