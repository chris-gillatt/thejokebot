name: bluesky_validate_unfollow_ignore

on:
  schedule:
    - cron: "0 9 1 * *"  # monthly at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate_unfollow_ignore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate unfollow ignore handles
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          BLUESKY_USERNAME: ${{ vars.BLUESKY_USERNAME }}
          BLUESKY_UNFOLLOW_IGNORE_SECRET: ${{ secrets.BLUESKY_UNFOLLOW_IGNORE }}
          BLUESKY_UNFOLLOW_IGNORE_VAR: ${{ vars.BLUESKY_UNFOLLOW_IGNORE }}
          BLUESKY_FAIL_ON_STALE_IGNORE: "true"
        run: |
          export BLUESKY_UNFOLLOW_IGNORE="${BLUESKY_UNFOLLOW_IGNORE_SECRET:-$BLUESKY_UNFOLLOW_IGNORE_VAR}"
          python bluesky_validate_unfollow_ignore.py