name: python_tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: changed_files
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docs:
              - '**/*.md'
              - 'docs/**'
              - 'images/**'
            non_docs:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!images/**'

      - name: Report docs-only skip decision
        if: github.event_name != 'workflow_dispatch' && steps.changed_files.outputs.docs == 'true' && steps.changed_files.outputs.non_docs != 'true'
        run: echo "Docs-only change detected; skipping python_tests job steps."

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.changed_files.outputs.non_docs == 'true'
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.changed_files.outputs.non_docs == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        if: github.event_name == 'workflow_dispatch' || steps.changed_files.outputs.non_docs == 'true'
        run: python -m pytest tests/ -v --tb=short --cov --cov-fail-under=75
